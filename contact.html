<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page info -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ContractCraft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top navigation -->
    <header class="header">
        <nav class="nav container">
            <div class="logo">CONTRACTCRAFT</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="home.html">Bundle</a></li>
                <li><a href="contract.html">Preview</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact form section -->
    <section class="container section narrow">
        <h2 class="section-title">Get in Touch</h2>

        <!-- Form that opens your email client directly -->
        <form class="form" action="mailto:seraphkeith@gmail.com" method="post" enctype="text/plain">
            <!-- Name input -->
            <input type="text" name="name" placeholder="Your Name" required>

            <!-- Email input -->
            <input type="email" name="email" placeholder="Your Email" required>

            <!-- Message input -->
            <textarea name="message" rows="5" placeholder="Type your message..." required></textarea>

            <!-- Submit button -->
            <button class="btn-gold" type="submit">Send Message</button>
        </form>

        <!-- Friendly note below form -->
        <p style="color:#d4af37; margin-top:15px;">Click send and it will open your email client with my address ready!</p>
    </section>

    <!-- Footer with quick links -->
    <footer class="footer">
        <div class="container footer-flex">
            <p>© 2026 ContractCraft</p>
            <div>
                <a href="index.html">Home</a>
                <a href="home.html">Bundle</a>
                <a href="contract.html">Preview</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </footer>

</body>
</html>
